matrix:
  # vars: short names for models (alphanumeric, 1-8 chars)
  # - required for sets and evict_costs settings
  # - each entry is a short name to a real model ID. Do not use an alias
  # - used to keep set DSL logic short and easier to read
  # - sets and evict_costs only use identifiers defined in vars
  vars:
    gemma26: gemma26
    gemma31: gemma31q4
    codest: codestral-22b-q8
    qw36a3b: qwen36-a3b-q6
    qw3627b: qwen36-27b-mtp-q3
    qw27bq4: qwen36-27b-ud-q4
    qw27bq6: qwen36-27b-ud-q6
    ornith1: ornith-1.0-9B
    qwimage: qwen-image-2512-Q4_K_M

  evict_costs:
    gemma31: 40   # 31B Q4, slow cold start
    qw36a3b: 40   # 35B Q6, slow cold start
    qw27bq6: 22   # 27B UD Q6_K_XL, good quality, fast cold start
    gemma26: 30   # 26B Q4, moderate cold start
    codest: 25    # 22B Q8, moderate cold start
    qw27bq4: 20   # 27B UD Q4_K_XL, MTP enabled, fast cold start
    qw3627b: 20   # 27B Q3, faster cold start
    ornith1: 10   # 9B Q6, fast cold start
    qwimage: 50   # sd-server, very slow cold start

  # sets: named sets of concurrent model combinations
  # Values are DSL strings with operators:
  #   &     AND (models run together)
  #   |     OR  (alternatives)
  #   ()    grouping
  #   +ref  inline another set's expression
  #
  # Expansion examples:
  #   "L"                  → [L]
  #   "a & b"              → [a, b]
  #   "a | b"              → [a], [b]
  #   "(a | b) & c"        → [a, c], [b, c]
  #   "(a | b) & (c | d)"  → [a,c], [a,d], [b,c], [b,d]
  #   "+llms & v"          → expands llms inline, then applies & v
  sets:
    # GPU 0 (48 GB) - large models, solo only (no pair fits)
    standard: "gemma31 | gemma26 | qw36a3b | qw3627b | qw27bq4 | qw27bq6 | codest"

    # GPU 1 (16 GB) - only ornith
    ornith: "ornith1"

    # cross-GPU: ornith on GPU 1 paired with any GPU 0 model
    # expands to: [ornith1,gemma31], [ornith1,gemma26], [ornith1,qw36a3b], [ornith1,qw3627b], [ornith1,qw27bq4], [ornith1,qw27bq6]
    standardornith: "ornith1 & (gemma31 | gemma26 | qw36a3b | qw3627b | qw27bq4 | qw27bq6)"

    # code model alone on GPU 0
    code: "codest"

    # image generation (sd-server uses both GPUs)
    picture: "qwimage"


