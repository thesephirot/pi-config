  qwen-image-2512-Q4_K_M:
    checkEndpoint: "/"
    cmd: sd-server --listen-port ${PORT} --diffusion-model /models/unsloth/Qwen-Image-2512-GGUF/qwen-image-edit-2511-Q4_K_M.gguf --vae /models/unsloth/Qwen-Image-2512-GGUF/qwen_image_vae.safetensors --llm /models/unsloth/Qwen-Image-2512-GGUF/Qwen2.5-VL-7B-Instruct-UD-Q4_K_XL.gguf --cfg-scale 2.5 --sampling-method euler --steps 40 --height 1024 --width 1024 --diffusion-fa --flow-shift 3 -v

matrix:
  # vars: short names for models (alphanumeric, 1-8 chars)
  # - required for sets and evict_costs settings
  # - each entry is a short name to a real model ID. Do not use an alias
  # - used to keep set DSL logic short and easier to read
  # - sets and evict_costs only use identifiers defined in vars
  vars:
    gemma26: gemma26
    gemma31: gemma31q4
    codest: codestral-22b-q8
    qw36a3b: qwen36-a3b-q6
    qw3627b: qwen36-27b-mtp-q3
    ornith1: ornith-1.0-9B
    qwimage: qwen-image-2512-Q4_K_M

  # evict_costs: relative cost of losing a running model (default: 1)
  # evict_costs:
  #   v: 50 # vllm backend, slow cold start
  #   L: 30 # 70B weights, slow to load

  # sets: named sets of concurrent model combinations
  # Values are DSL strings with operators:
  #   &     AND (models run together)
  #   |     OR  (alternatives)
  #   ()    grouping
  #   +ref  inline another set's expression
  #
  # Expansion examples:
  #   "L"                  → [L]
  #   "a & b"              → [a, b]
  #   "a | b"              → [a], [b]
  #   "(a | b) & c"        → [a, c], [b, c]
  #   "(a | b) & (c | d)"  → [a,c], [a,d], [b,c], [b,d]
  #   "+llms & v"          → expands llms inline, then applies & v
  sets:
    # LLM + TTS: switching between g/q/m won't evict v
    # expands to: [g,v], [q,v], [m,v]
    #  standard: "(g | q | m) & v"
    standardgemma: "(gemma26 & gemma31) | (gemma26 & qw36a3b) | (gemma26 & qw3627b)"

    # LLM + TTS + reranker
    # expands to: [g,v,e], [q,v,e]
    standardornith: "(ornith1 & gemma31) | (ornith1 & qw36a3b) | (ornith1 & qw3627b)"

    # LLM + image generation, no TTS
    # expands to: [g,sd], [q,sd]
    code: "codest"

    # 70B model uses all GPUs, can only run alone
    # expands to: [L]
    picture: "qwimage"


