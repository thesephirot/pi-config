includeAliasesInList: true
sendLoadingState: true

models:
  gemma31q4:
    filters:
      stripParams: "temperature, top_p, top_k, min_p, presence_penalty, repeat_penalty"
      setParamsByID:
        "${MODEL_ID}:thinking":
          chat_template_kwargs:
            enable_thinking: true
          reasoning_budget: 4096
          temperature: 1.0
          top_p: 0.95
          top_k: 64
          min_p: 0.1
          presence_penalty: 0.0
          repeat_penalty: 1.0
        "${MODEL_ID}:nothinking":
          chat_template_kwargs:
            enable_thinking: false
          reasoning_budget: 0
          temperature: 0.1
          top_p: 0.95
          top_k: 64
          min_p: 0.1
    cmd: llama-server --port ${PORT} --model /models/lmstudio-community/gemma-4-31B-it-GGUF/gemma-4-31B-it-Q4_K_M.gguf -md /models/lmstudio-community/gemma-4-31B-it-GGUF/gemma4-31B-it-assistant-Q4_K_M.gguf --n-gpu-layers 999 --spec-type draft-mtp --spec-draft-n-max 2 --spec-draft-n-min 1 --ctx-size 262144 --host 0.0.0.0 --temp 0.1 --top-p 0.95 --top-k 64 --split-mode none --main-gpu 0 --flash-attn on --no-mmap -ngl 99 -ngld 99 --threads 16 --cache-type-k q4_0 --cache-type-v q4_0 --no-mmproj --parallel 1 --jinja

  gemma26:
