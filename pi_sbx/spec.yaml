schemaVersion: "1"
kind: sandbox
name: pi
displayName: "Pi Coding Agent"
description: "Pi coding agent with llama-swap, taskflow, and web-access extensions"

sandbox:
  image: docker/sandbox-templates:shell
  entrypoint:
    run: ["bash"]
  aiFilename: "PI.md"

commands:
  install:
    - user: "0"
      command: |
        apt-get update && apt-get install -y --no-install-recommends \
          bash ca-certificates git ripgrep \
          && rm -rf /var/lib/apt/lists/*

    - user: "1000"
      command: |
        npm install -g --ignore-scripts @earendil-works/pi-coding-agent && \
        pi install npm:pi-taskflow && \
        pi install npm:pi-web-access
        pi install npm:@danielmeneses/pi-llama-swap

  startup:
    - user: "1000"
      command:
        - sh
        - -c
        - |
          echo "=== Pi Sandbox Starting ==="
          echo "Llama-Swap: http://127.0.0.1:8080"
          echo "Extensions: taskflow, web-access, pi-llama-swap"
          echo "==========================="


environment:
  variables:
    LLAMA_SWAP_URL: "http://192.168.68.67"
    LLAMA_SWAP_PORT: "8080"

caps:
  network:
    allow:
      - "registry.npmjs.org"
      - "*.npmjs.org"
      - "github.com"
      - "*.githubusercontent.com"
      - "127.0.0.1"
      - "10.*"
      - "192.168.*"
      - "172.16.*"
      - "192.168.68.67:8080"
      - "pi.dev"

agentContext: |
  This sandbox runs the Pi coding agent with the following extensions:
  - **pi-taskflow**: Orchestrator engine for multi-phase agent workflows
  - **pi-web-access**: Web search, URL fetching, GitHub, and video analysis
  - **pi-llama-swap**: Dynamic model discovery and switching via llama-swap at http://127.0.0.1:8080

  The llama-swap sandbox provides local model switching.
  Models are served on port 8080. Use /llama-swap-set-context-length to override context windows.
